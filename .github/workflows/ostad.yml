name: CICD pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  Test:
    runs-on: ubuntu-latest

    steps:
      - name: Git Clone
        uses: actions/checkout@v2

      - name: install the node
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      
      - name: install packages
        run: npm install 

      - name: Run the Test
        run: npm run test
     
  Deploy:
    runs-on: ubuntu-latest
    needs: Test
    steps:
      - name: SSH into EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ vars.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo apt update && sudo apt install nginx -y