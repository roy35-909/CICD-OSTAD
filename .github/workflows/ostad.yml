name: CICD pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  Deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout the home directory
        run : |
          cd /home/ubuntu/CICD-OSTAD
          git pull 
          pm2 status
          pm2 restart all
          

          
